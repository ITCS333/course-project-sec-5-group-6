<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Weekly Breakdown</title>
    <script src="admin.js" defer></script>
</head>
<body>

<header>
    <h1>Manage Weekly Breakdown</h1>
</header>

<main>

    <!-- Add / Edit Week -->
    <section>
        <h2 id="form-title">Add a New Week</h2>

        <form id="week-form">
            <fieldset>
                <legend>Weekly Details</legend>

                <label>Week Title</label>
                <input id="week-title" type="text" required>

                <label>Start Date</label>
                <input id="week-start-date" type="date" required>

                <label>Description</label>
                <textarea id="week-description"></textarea>

                <label>Resource Links</label>
                <textarea id="week-links"></textarea>

                <button type="submit" id="submit-btn">Add Week</button>
            </fieldset>
        </form>
    </section>

    <!-- Table -->
    <section>
        <h2>Current Weekly Breakdown</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="weeks-tbody"></tbody>
        </table>
    </section>

</main>

</body>
</html>
