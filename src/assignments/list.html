<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Assignments</title>
    <link rel="stylesheet" href="../../assets/styles.css">
    <script src="list.js" defer></script>
    <style>
        body {
            font-family: Georgia, serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background: #f9f9f9;
            color: #222;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #222;
            padding-bottom: 1rem;
        }
        header h1 {
            margin: 0;
            font-size: 2rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .controls input,
        .controls select {
            padding: 0.5rem 0.75rem;
            border: 1px solid #ccc;
            font-size: 1rem;
            border-radius: 4px;
        }
        .controls input {
            flex: 1;
            min-width: 200px;
        }
        #assignment-list-section article {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        #assignment-list-section article h2 {
            margin: 0 0 0.25rem;
            font-size: 1.25rem;
        }
        #assignment-list-section article p {
            margin: 0.25rem 0;
            color: #555;
            font-size: 0.95rem;
        }
        #assignment-list-section article a {
            display: inline-block;
            margin-top: 0.75rem;
            color: #005fcc;
            text-decoration: none;
            font-size: 0.95rem;
        }
        #assignment-list-section article a:hover {
            text-decoration: underline;
        }
        #loading-message {
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>Course Assignments</h1>
    </header>

    <main>
        <div class="controls">
            <input type="text" id="search-input" placeholder="Search assignments...">
            <select id="sort-select">
                <option value="due_date">Sort by Due Date</option>
                <option value="title">Sort by Title</option>
                <option value="created_at">Sort by Created</option>
            </select>
            <select id="order-select">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </div>

        <section id="assignment-list-section">
            <p id="loading-message">Loading assignments...</p>
        </section>
    </main>
</body>
</html>
