<!--
  Requirement: Create the Admin View for Assignments

  Instructions:
  Fill in the HTML elements as described in the comments.
  This page allows the teacher (admin) to perform full CRUD operations
  on course assignments.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: Add the <meta> tag for character encoding (UTF-8). -->
    <meta charset="UTF-8">

    <!-- TODO: Add the responsive viewport <meta> tag
         (width=device-width, initial-scale=1.0). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TODO: Add a <title>, e.g., "Manage Assignments". -->
    <title>Manage Assignments</title>

    <!-- TODO: Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="../../assets/styles.css">

    <!-- Required: link admin.js with defer. -->
    <script src="admin.js" defer></script>
    <style>
        body {
            font-family: Georgia, serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
            background: #f9f9f9;
            color: #222;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #222;
            padding-bottom: 1rem;
        }
        header h1 { margin: 0; font-size: 2rem; }
        section { margin-bottom: 2rem; }
        h2 { font-size: 1.4rem; margin-bottom: 1rem; }
        fieldset {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1.25rem;
            background: #fff;
        }
        legend { font-weight: bold; padding: 0 0.5rem; }
        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
        }
        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { resize: vertical; }
        button[type="submit"] {
            margin-top: 1rem;
            padding: 0.5rem 1.25rem;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        button[type="submit"]:hover { background: #444; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.95rem;
        }
        th { background: #222; color: #fff; }
        tr:nth-child(even) { background: #f4f4f4; }
        .edit-btn, .delete-btn {
            padding: 0.3rem 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 0.25rem;
        }
        .edit-btn { background: #005fcc; color: #fff; }
        .edit-btn:hover { background: #0047a0; }
        .delete-btn { background: #cc0000; color: #fff; }
        .delete-btn:hover { background: #a00000; }
    </style>
</head>
<body>

    <!-- TODO: Create a <header> containing an <h1> "Manage Assignments". -->
    <header>
        <h1>Manage Assignments</h1>
    </header>

    <!-- TODO: Create the <main> content area. -->
    <main>

        <!-- ============================================================
             Section 1: Add / Edit Assignment Form
             ============================================================ -->
        <!-- TODO: Create a <section> for the form. -->
        <section>

            <!-- TODO: Add a sub-heading <h2> "Add a New Assignment". -->
            <h2>Add a New Assignment</h2>

            <!-- TODO: Create a <form id="assignment-form"> (action can be "#"). -->
            <form id="assignment-form" action="#">

                <!-- TODO: Use a <fieldset> to group the form controls. -->
                <fieldset>

                    <!-- TODO: Add a <legend>, e.g., "Assignment Details". -->
                    <legend>Assignment Details</legend>

                    <!-- TODO: Add a <label> and <input> for the assignment title. -->
                    <label for="assignment-title">Title</label>
                    <input type="text" id="assignment-title" required>

                    <!-- TODO: Add a <label> and <textarea> for the description. -->
                    <label for="assignment-description">Description</label>
                    <textarea id="assignment-description" rows="5" required></textarea>

                    <!-- TODO: Add a <label> and <input> for the due date. -->
                    <label for="assignment-due-date">Due Date</label>
                    <input type="date" id="assignment-due-date" required>

                    <!-- TODO: Add a <label> and <textarea> for attached file URLs
                         (one URL per line). -->
                    <label for="assignment-files">Attached File URLs (one per line)</label>
                    <textarea id="assignment-files" rows="3"></textarea>

                    <!-- TODO: Add a submit <button>.
                         - id="add-assignment", type="submit" -->
                    <button id="add-assignment" type="submit">Add Assignment</button>

                </fieldset>
            </form>
            <!-- End of <form> -->

        </section>
        <!-- End of form <section> -->


        <!-- ============================================================
             Section 2: Existing Assignments Table
             ============================================================ -->
        <!-- TODO: Create a <section> to display the current list. -->
        <section>

            <!-- TODO: Add a sub-heading <h2> "Current Assignments". -->
            <h2>Current Assignments</h2>

            <!-- TODO: Create a <table id="assignments-table">. -->
            <table id="assignments-table">

                <!-- TODO: Create a <thead> with columns:
                     Title | Due Date | Description | Actions -->
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Due Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <!-- TODO: Create a <tbody id="assignments-tbody">. -->
                <tbody id="assignments-tbody">
                    <!-- admin.js will inject rows here. Each row follows
                         this structure (do NOT hardcode real data):

                    <tr>
                        <td>HTML &amp; CSS Portfolio</td>
                        <td>2025-02-15</td>
                        <td>Create a responsive portfolio...</td>
                        <td>
                            <button class="edit-btn"   data-id="1">Edit</button>
                            <button class="delete-btn" data-id="1">Delete</button>
                        </td>
                    </tr>
                    -->
                </tbody>

            </table>
            <!-- End of <table> -->

        </section>
        <!-- End of list <section> -->

    </main>
    <!-- End of <main> -->

</body>
</html>
