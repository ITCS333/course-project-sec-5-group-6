<!--
  Requirement: Create the Dedicated Page for a Single Assignment

  Instructions:
  This page displays the full details for one assignment and allows
  students to read and post discussion comments.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: Add <meta> tags for charset (UTF-8) and viewport
         (width=device-width, initial-scale=1.0). -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TODO: Add a <title>, e.g., "Assignment Details". -->
    <title>Assignment Details</title>

    <!-- TODO: Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="../../assets/styles.css">

    <!-- Required: link details.js with defer. -->
    <script src="details.js" defer></script>
    <style>
        body {
            font-family: Georgia, serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background: #f9f9f9;
            color: #222;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #222;
            padding-bottom: 1rem;
        }
        header h1 { margin: 0; font-size: 2rem; }
        article {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        #assignment-due-date { color: #555; font-style: italic; margin-top: 0; }
        #assignment-files-list li { margin: 0.4rem 0; }
        #assignment-files-list a { color: #005fcc; }
        #discussion-forum h2 { font-size: 1.4rem; margin-bottom: 1rem; }
        #comment-list article {
            background: #f4f4f4;
            border: 1px solid #e0e0e0;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
        }
        #comment-list article p { margin: 0 0 0.5rem; }
        #comment-list article footer { font-size: 0.85rem; color: #777; }
        #comment-form fieldset {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1.25rem;
            background: #fff;
        }
        #comment-form legend { font-weight: bold; padding: 0 0.5rem; }
        #comment-form textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 0.5rem;
        }
        #comment-form button {
            margin-top: 0.75rem;
            padding: 0.5rem 1.25rem;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        #comment-form button:hover { background: #444; }
        a.back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #005fcc;
            text-decoration: none;
        }
        a.back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- TODO: Create a <header>.
         Inside it, add an <h1 id="assignment-title">. -->
    <header>
        <h1 id="assignment-title">Loading...</h1>
    </header>

    <!-- TODO: Create the <main> content area. -->
    <main>
        <a class="back-link" href="list.html">&larr; Back to Assignments</a>

        <!-- ============================================================
             Section 1: Assignment Information
             ============================================================ -->
        <!-- TODO: Use an <article> to display the main assignment information. -->
        <article>

            <!-- TODO: Add a <p id="assignment-due-date">. -->
            <p id="assignment-due-date"></p>

            <!-- TODO: Add a <h2> "Description". -->
            <h2>Description</h2>

            <!-- TODO: Add a <p id="assignment-description">. -->
            <p id="assignment-description"></p>

            <!-- TODO: Add a <h2> "Attached Files &amp; Links". -->
            <h2>Attached Files &amp; Links</h2>

            <!-- TODO: Add a <ul id="assignment-files-list">. -->
            <ul id="assignment-files-list"></ul>

        </article>
        <!-- End of <article> -->


        <!-- ============================================================
             Section 2: Discussion Forum
             ============================================================ -->
        <!-- TODO: Create a <section id="discussion-forum">. -->
        <section id="discussion-forum">

            <!-- TODO: Add a <h2> "Questions &amp; Discussion". -->
            <h2>Questions &amp; Discussion</h2>

            <!-- Subsection 2.1: Existing Comments -->
            <!-- TODO: Add a <div id="comment-list">. -->
            <div id="comment-list"></div>

            <!-- Subsection 2.2: Add a Comment Form -->
            <!-- TODO: Create a <form id="comment-form"> (action="#"). -->
            <form id="comment-form" action="#">

                <!-- TODO: Use a <fieldset> to group the controls. -->
                <fieldset>

                    <!-- TODO: Add a <legend>, e.g., "Ask a Question". -->
                    <legend>Ask a Question</legend>

                    <!-- TODO: Add a <label> and <textarea> for the comment.
                         - label for="new-comment"
                         - textarea id="new-comment", required -->
                    <label for="new-comment">Your comment:</label>
                    <textarea id="new-comment" required></textarea>

                    <!-- TODO: Add a submit <button>. -->
                    <button type="submit">Post Comment</button>

                </fieldset>
            </form>
            <!-- End of <form> -->

        </section>
        <!-- End of <section#discussion-forum> -->

    </main>
    <!-- End of <main> -->

</body>
</html>
