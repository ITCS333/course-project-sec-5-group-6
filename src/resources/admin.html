<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Charset & viewport -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin – Manage Resources</title>

  <!-- Shared styles -->
  <link rel="stylesheet" href="../common/styles.css" />
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Admin – Manage Course Resources</h1>
  </header>

  <!-- Main content -->
  <main>
    <div style="width: 100%; max-width: 960px; margin: 0 auto; display: grid; gap: 1.5rem;">
      <!-- Section 1: Add / Create resource -->
      <section class="card">
        <h2>Add a New Resource</h2>

        <form id="resource-form" action="#">
          <fieldset>
            <legend>Resource Details</legend>

            <label for="resource-title">Title</label>
            <input id="resource-title" type="text" required />

            <label for="resource-description">Description</label>
            <textarea
              id="resource-description"
              rows="3"
              placeholder="Optional short description of this resource"
            ></textarea>

            <label for="resource-link">Link (URL)</label>
            <input
              id="resource-link"
              type="url"
              required
              placeholder="https://example.com/resource"
            />

            <div style="margin-top: 0.9rem;">
              <button id="add-resource" type="submit">Add Resource</button>
            </div>
          </fieldset>
        </form>
      </section>

      <!-- Section 2: Existing resources list -->
      <section class="card">
        <h2>Existing Resources</h2>

        <div class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.5rem;">
          Click “Delete” to remove a resource. Edit is not required for this task,
          so the Edit buttons are disabled visually.
        </div>

        <div class="table-responsive" style="overflow-x: auto;">
          <table id="resources-table" style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr>
                <th style="text-align: left; padding: 0.4rem 0.2rem;">Title</th>
                <th style="text-align: left; padding: 0.4rem 0.2rem;">Description</th>
                <th style="text-align: left; padding: 0.4rem 0.2rem;">Actions</th>
              </tr>
            </thead>
            <tbody id="resources-tbody">
              <tr>
                <td colspan="3" class="text-muted">
                  Loading resources...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="admin.js" defer></script>
</body>
</html>
