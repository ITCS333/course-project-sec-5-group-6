  Requirement: Create a Responsive Login Page

  Instructions:
  Fill in the HTML elements as described in the comments.
  Use the provided IDs for the elements that require them.
  You are encouraged to use a CSS framework for styling, as hinted in the comments,
  but you can also use your own stylesheet.
-->
<!DOCTYPE html>
<html lang="en">
<head>
 
<meta charset="UTF-8">
   

<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<title>Login</title>

    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  
<style>


body {font-family: "Segoe UI", Tahoma, sans-serif;background: linear-gradient(to right, #ffe4ec, #fff0f5);}


.card {border-radius: 20px;border: none;}


h2 {font-family: Georgia, serif;font-weight: bold;color: #941957;}

legend {color: #941957;font-weight: 500;}


label {font-size: 14px;color: #941957;}


input {border-radius: 10px;border: 1px solid #ffc0cb;}

input:focus {border-color: #ff69b4;box-shadow: 0 0 5px #ffb6c1;}


button {font-family: Georgia, serif;background: #ffb6c1;color: #941957;border-radius: 12px;
  border: none;
  font-weight: bold;
  transition: 0.3s;}

button {background: #ffb6c1;color: #941957;border-radius: 12px;border: none;font-weight: bold; transition: 0.3s;}

button:hover {background: #ff69b4;color: white;}

#message-container {font-size: 14px;color: #d63384;}
</style>

</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<main>
<section class="card p-4 shadow" style="width: 350px;">
   
<h2 class="text-center mb-3">Welcome Back! 💕</h2>
<form id="login-form" action="#">

 <fieldset>
    
  
 <legend class="text-center fs-6 mb-3">Secure Login</legend>
      
            

          
 <div class="mb-3">
<label for="email" class="form-label">Email Address</label>
      <input 
      type="email" 
      id="email" 
     class="form-control" 
      required>    </div>

                    
<div class="mb-3">
  <label for="password" class="form-label">Password</label>
    <input 
 type="password" 
  id="password" 
 class="form-control" 
 required 
 minlength="8">
</div>
                

         
<button type="submit" id="login" class="bnt w-100" 
style="background-color: pink;color: black;border: black;">
Log In 
</button>
                    
      
</fieldset>
  
 <div id="message-container" class="mt-3 text-center"></div>

</form>
</section>
</main>
<script src="login.js" defer></script>

</body>
</html>
